name: Build, Push & Deploy

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Nach dem Build deployen?"
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Typecheck ──────────────────────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit

  # ── Docker Image bauen & pushen ────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ env.VERSION }}
            type=sha,prefix=sha-

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: BUILD_DATE=${{ github.run_started_at }}

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    needs: [build-and-push, typecheck]
    if: ${{ github.event.inputs.deploy != 'false' }}
    runs-on: ubuntu-latest
    environment: asgard
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: GHCR_TOKEN
          script: |
            IMAGE="ghcr.io/jfahrni/migrane-tracker:latest"
            DIR="$HOME/migrane-tracker"

            echo "→ ghcr.io login..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u jfahrni --password-stdin

            echo "→ Image pullen..."
            docker pull "$IMAGE"

            echo "→ Container neu starten..."
            cd "$DIR"
            docker compose up -d --force-recreate

            docker image prune -f
            echo "✓ migrane-tracker deployed."
